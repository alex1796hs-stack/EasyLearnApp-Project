services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=english_user
      - POSTGRES_PASSWORD=english_pass
      - POSTGRES_DB=english_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      # Use polling for hot reloading on Windows/Docker Desktop
      - WATCHFILES_FORCE_POLLING=true
      - DATABASE_URL=postgresql://english_user:english_pass@db:5432/english_db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

volumes:
  postgres_data:
